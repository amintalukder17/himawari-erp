<h1>Himawari Education ERP</h1>
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Himawari Education ERP</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .logo { max-width: 150px; margin-bottom: 20px; border-radius: 8px; }
        .staff-card { border: 1px solid #ddd; padding: 15px; margin: 10px; display: inline-block; width: 200px; border-radius: 8px; background: #fff; vertical-align: top; }
        .staff-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background-color: #eee; margin-bottom: 10px; }
        h1 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

<div class="container">
    <!-- এখানে logo.png এর জায়গায় আপনার আপলোড করা লোগো ফাইলের সঠিক নাম ও এক্সটেনশন বসাবেন -->
    <img src="logo.png" alt="Himawari Logo" class="logo">
    
    <h1>Himawari Education ERP</h1>
    <p>আমাদের শিক্ষা ম্যানেজমেন্ট সিস্টেমে আপনাকে স্বাগতম।</p>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    
    <h2>স্টাফ ও শিক্ষক তালিকা</h2>
    
    <!-- স্টাফ ১ -->
    <div class="staff-card">
        <img src="staff1.jpg" alt="Md Amin Talukder" class="staff-img">
        <h3>মো: আমিন তালুকদার</h3>
        <p>অপারেশনস ম্যানেজার</p>
    </div>

    <!-- স্টাফ ২ (এখানে আপনার অন্য স্টাফদের তথ্য বসাতে পারেন) -->
    <div class="staff-card">
        <img src="staff2.jpg" alt="Staff 2" class="staff-img">
        <h3>স্টাফের নাম</h3>
        <p>পদবী</p>
    </div>
</div>

</body>
</html>
